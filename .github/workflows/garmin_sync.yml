name: Garmin Sync

on:
  schedule:
    - cron: '0 12 * * *'
    - cron: '0 17 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install garminconnect requests
          npm install -g garmin-connect

      - name: Configure garmin-connect CLI
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: |
          echo '{"username":"'$GARMIN_EMAIL'","password":"'$GARMIN_PASSWORD'"}' > ~/.garmin-connect.json

      - name: Run Garmin sync
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python garmin_sync.py

      - name: Commit and push
        run: |
          git config user.name "MTB Agent Bot"
          git config user.email "bot@mtbagent.app"
          git add garmin_data.json
          git diff --staged --quiet || git commit -m "auto sync garmin $(date '+%Y-%m-%d %H:%M')"
          git push
